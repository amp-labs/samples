# AccuLynx Integration
# API Documentation: https://apidocs.acculynx.com/

specVersion: 1.0.0
integrations:
  - name: readWriteSubscribeAccuLynx
    displayName: AccuLynx read, write, and subscribe
    provider: accuLynx

    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:
        - objectName: jobs
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/jobs
          # requiredFields are always synced on every record.
          requiredFields:
            - fieldName: id
            - fieldName: modifiedDate
            - fieldName: jobNumber
          # optionalFieldsAuto: all syncs every other available field automatically.
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: contacts
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/contacts
          requiredFields:
            - fieldName: id
            - fieldName: firstName
            - fieldName: lastName
          # Alternatively, pin a specific set of optional fields instead of
          # syncing them all with optionalFieldsAuto: all.
          optionalFields:
            - fieldName: companyName
            - fieldName: modifiedDate
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: users
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/users
          requiredFields:
            - fieldName: id
            - fieldName: firstName
            - fieldName: lastName
            - fieldName: email
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: calendars
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/getcalendars
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: estimates
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/estimates
          requiredFields:
            - fieldName: id
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: contacts/custom-fields
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/getcontactcustomfields
          requiredFields:
            - fieldName: id
            - fieldName: modifiedDate
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: jobs/custom-fields
          destination: accuLynxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://apidocs.acculynx.com/reference/getjobcustomfields
          requiredFields:
            - fieldName: id
            - fieldName: modifiedDate
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

    # Define the objects you want to write to.
    # See https://docs.withampersand.com/docs/write-actions for more information.
    write:
      objects:
        - objectName: contacts # https://apidocs.acculynx.com/reference/contacts
        - objectName: jobs # https://apidocs.acculynx.com/reference/jobs
        - objectName: contacts/custom-fields # https://apidocs.acculynx.com/reference/putcontactcustomfield
        - objectName: jobs/custom-fields # https://apidocs.acculynx.com/reference/putjobcustomfield

    # Define the objects you want to subscribe to. Ampersand creates and updates
    # the AccuLynx webhook subscription on your behalf — no manual setup required.
    # See https://docs.withampersand.com/docs/subscribe-actions for more information.
    subscribe:
      objects:
        - objectName: jobs
          destination: accuLynxWebhook
          inheritFieldsAndMapping: true
          createEvent:
            enabled: always
          updateEvent:
            enabled: always
            watchFieldsAuto: all
        - objectName: contacts
          destination: accuLynxWebhook
          inheritFieldsAndMapping: true
          createEvent:
            enabled: always
          updateEvent:
            enabled: always
            watchFieldsAuto: all

    proxy:
      enabled: true
