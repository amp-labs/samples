specVersion: 1.0.0
integrations:
  - name: readAndWritePhoneBurner
    displayName: PhoneBurner read and write
    provider: phoneBurner

    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:

        - objectName: contacts
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#contacts
          requiredFields:
            - fieldName: contact_user_id
            - fieldName: first_name
            - fieldName: last_name
          optionalFieldsAuto: all

        - objectName: members
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#members
          requiredFields:
            - fieldName: user_id
            - fieldName: first_name
            - fieldName: last_name
          optionalFieldsAuto: all

        - objectName: folders
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#folders
          requiredFields:
            - fieldName: folder_id
            - fieldName: folder_name
          optionalFieldsAuto: all

        - objectName: dialsession
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#dialsession
          requiredFields:
            - fieldName: dialsession_id
            - fieldName: callerid
          optionalFieldsAuto: all

        - objectName: tags
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#tags
          requiredFields:
            - fieldName: id
            - fieldName: title
          optionalFieldsAuto: all

        - objectName: voicemails
          destination: phoneBurnerWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names can be found at https://www.phoneburner.com/developer/route_list#voicemails
          requiredFields:
            - fieldName: recording_id
            - fieldName: name
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: contacts # https://www.phoneburner.com/developer/route_list#contacts
        - objectName: members # https://www.phoneburner.com/developer/route_list#members
        - objectName: folders # https://www.phoneburner.com/developer/route_list#folders
        - objectName: dialsession # https://www.phoneburner.com/developer/route_list#dialsession (create only)

    proxy:
      enabled: true
