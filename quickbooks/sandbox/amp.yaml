specVersion: 1.0.0
integrations:
  - name: read-write-quickbooks-sandbox
    provider: quickbooksSandbox

    read:
      objects:
        # Customers Object - Core CRM data
        # API Reference: https://developer.intuit.com/app/developer/qbo/docs/api/accounting/all-entities/customer
        - objectName: customer
          destination: qsandboxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: Id
            - fieldName: DisplayName
            - fieldName: GivenName
            - fieldName: FamilyName
            - fieldName: FullyQualifiedName
            - fieldName: CompanyName
            - fieldName: PrimaryEmailAddr
          optionalFields:
            - fieldName: BillAddr
            - fieldName: ShipAddr
            - fieldName: PrimaryPhone
            - fieldName: Mobile

        # Invoices Object - Sales transactions
        # API Reference: https://developer.intuit.com/app/developer/qbo/docs/api/accounting/all-entities/invoice
        - objectName: invoice
          destination: qsandboxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: Id
            - fieldName: DocNumber
            - fieldName: TxnDate
            - fieldName: DueDate
            - fieldName: CustomerRef
            - fieldName: Line
            - fieldName: TotalAmt
            - fieldName: Balance
          optionalFields:
            - fieldName: BillEmail
            - fieldName: BillAddr
            - fieldName: ShipAddr
            - fieldName: ShipDate

        # Accounts Object - Chart of accounts
        # API Reference: https://developer.intuit.com/app/developer/qbo/docs/api/accounting/all-entities/account
        - objectName: account
          destination: qsandboxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: Id
            - fieldName: Name
            - fieldName: AccountType
            - fieldName: AccountSubType
            - fieldName: AcctNum
            - fieldName: Classification
          optionalFieldsAuto: all # Include all available fields

        # Items Object - Products and services
        # API Reference: https://developer.intuit.com/app/developer/qbo/docs/api/accounting/all-entities/item
        - objectName: item
          destination: qsandboxWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: Id
            - fieldName: Name
            - fieldName: Type
            - fieldName: Active
            - fieldName: FullyQualifiedName
          optionalFields:
            - fieldName: QtyOnHand
            - fieldName: UnitPrice

    write:
      objects:
        - objectName: customer
        - objectName: invoice
        - objectName: item
