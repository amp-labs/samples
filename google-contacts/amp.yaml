specVersion: 1.0.0
integrations:
  - name: readAndWriteGoogleContacts
    displayName: Google contacts read and write
    provider: google
    module: contacts
    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:

        - objectName: myConnections
          destination: googleContactsWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://developers.google.com/people/api/rest/v1/people.connections/list
          requiredFields:
            - fieldName: id
            - fieldName: etag
            - fieldName: names
          optionalFieldsAuto: all

        - objectName: contactGroups
          destination: googleContactsWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://developers.google.com/people/api/rest/v1/contactGroups/list
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: resourceName
            - fieldName: groupType
          optionalFieldsAuto: all

        - objectName: otherContacts
          destination: googleContactsWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://developers.google.com/people/api/rest/v1/otherContacts/list
          requiredFields:
            - fieldName: id
            - fieldName: etag
            - fieldName: names
            - fieldName: emailAddresses
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: myConnections
        - objectName: contactGroups
