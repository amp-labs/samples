specVersion: 1.0.0
integrations:
  - name: readAndWriteTeamwork
    displayName: Teamwork read and write
    provider: teamwork
    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:
        - objectName: companies
          destination: teamworkWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://apidocs.teamwork.com/docs/teamwork/v3/companies/get-projects-api-v3-companies-json
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: city
          optionalFieldsAuto: all

        - objectName: tasks
          destination: teamworkWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://apidocs.teamwork.com/docs/teamwork/v3/tasks/get-projects-api-v3-tasks-json
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: priority
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: companies

    proxy:
      enabled: true
