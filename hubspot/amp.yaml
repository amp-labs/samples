specVersion: 1.0.0
integrations:
  - name: hubspotIntegration
    displayName: My Hubspot Integration
    provider: hubspot
    # Define the objects you want to read.
    # See https://docs.withampersand.com/docs/read-actions for more information.
    read:
      objects:
        - objectName: companies
          destination: defaultWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: name
            - fieldName: phone
            - fieldName: annualrevenue
            - fieldName: numberofemployees
            - fieldName: website
            - mapToName: priority
              mapToDisplayName: Priority
              prompt: What field to you use to track how strategic this account is?
          # Add `optionalFieldsAuto` to allow customers to pick any of their Contact fields,
          # Alternatively you can include a pre-chosen list in `optionalFields`.
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: contacts
          destination: defaultWebhook # define your webhook in Ampersand Dashboard.
          schedule: "*/10 * * * *" # Every 10 minutes.
          # These are fields that are always read for every customer.
          requiredFields:
            - fieldName: firstname
            - fieldName: lastname
            - fieldName: email
            - fieldName: lifecyclestage
          # Add `optionalFieldsAuto` to allow customers to pick any of their Contact fields,
          # Alternatively you can include a pre-chosen list in `optionalFields`.
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: campaigns
          destination: defaultWebhook # define your webhook in Ampersand Dashboard.
          # These are fields that are always read for every customer.
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: hs_name
            - fieldName: hs_notes
            - fieldName: hs_budget_items_sum_amount
          # Add `optionalFieldsAuto` to allow customers to pick any of their Contact fields,
          # Alternatively you can include a pre-chosen list in `optionalFields`.
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              fullHistory: true

        - objectName: marketing/emails
          destination: defaultWebhook # define your webhook in Ampersand Dashboard.
          # These are fields that are always read for every customer.
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: subject
            - fieldName: type
            - fieldName: updatedAt
          optionalFieldsAuto: all

        - objectName: forms
          destination: defaultWebhook # define your webhook in Ampersand Dashboard.
          # These are fields that are always read for every customer.
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: name
            - fieldName: updatedAt
          optionalFieldsAuto: all

        - objectName: marketing-events
          destination: defaultWebhook # define your webhook in Ampersand Dashboard.
          # These are fields that are always read for every customer.
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: eventName
            - fieldName: eventOrganizer
            - fieldName: updatedAt
          optionalFieldsAuto: all


    # Define the objects you want to write to.
    # See https://docs.withampersand.com/docs/write-actions for more information.
    write:
      objects:
        - objectName: contacts
        - objectName: companies
