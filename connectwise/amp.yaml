specVersion: 1.0.0
integrations:
  - name: readAndWriteConnectWise
    displayName: ConnectWise read and proxy.
    provider: connectWise
    read:
      objects:
        - objectName: contacts
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: firstName
            - fieldName: lastName
          optionalFieldsAuto: all

        - objectName: configurations
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: company
            - fieldName: contact
          optionalFieldsAuto: all

        - objectName: companies
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: name
            - fieldName: city
            - fieldName: country
          optionalFieldsAuto: all

    proxy:
      enabled: true
