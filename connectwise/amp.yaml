specVersion: 1.0.0
integrations:
  - name: readAndWriteConnectWise
    displayName: ConnectWise read and proxy.
    provider: connectWise
    subscribe:
      objects:
        - objectName: contacts
          destination: connectWiseWebhook
          inheritFieldsAndMapping: true
          createEvent:
            enabled: always
          updateEvent:
            enabled: always
            watchFieldsAuto: all
          deleteEvent:
            enabled: always
        - objectName: project/tickets
          destination: connectWiseWebhook
          inheritFieldsAndMapping: true
          createEvent:
            enabled: always
          updateEvent:
            enabled: always
            watchFieldsAuto: all
          deleteEvent:
            enabled: always
    read:
      objects:
        - objectName: contacts
          destination: connectWiseWebhook
          requiredFields:
            - fieldName: firstName
            - fieldName: lastName

        - objectName: project/tickets
          destination: connectWiseWebhook
          requiredFields:
            - fieldName: summary

        - objectName: configurations
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: company
            - fieldName: contact
          optionalFieldsAuto: all

        - objectName: companies
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: name
            - fieldName: city
            - fieldName: country
          optionalFieldsAuto: all

        - objectName: sales/opportunities
          destination: connectWiseWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: name
            - fieldName: status
            - fieldName: notes
            - fieldName: campaign
            - fieldName: currency
          optionalFieldsAuto: all

    proxy:
      enabled: true
