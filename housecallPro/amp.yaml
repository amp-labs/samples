            - fieldName: uuid
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: service_zones
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

   
        - objectName: routes
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

 

        - objectName: events
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: tags
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
