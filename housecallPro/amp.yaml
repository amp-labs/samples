specVersion: 1.0.0
integrations:
  - name: housecallProIntegration
    displayName: HousecallPro Integration
    provider: housecallPro
    proxy:
      enabled: true
    read:
      objects:
        - objectName: customers
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: email
            - fieldName: first_name
            - fieldName: last_name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: employees
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: email
            - fieldName: first_name
            - fieldName: last_name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: estimates
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: estimate_number
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: jobs
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: invoice_number
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15


        - objectName: job_fields/job_types
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: leads
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
