            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: price_book/price_forms
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: price_book/services
          destination: housecallProWebhook
