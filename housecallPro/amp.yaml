            - fieldName: status
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

    write:
      objects:
        - objectName: customers
        - objectName: estimates
        - objectName: jobs
        - objectName: job_fields/job_types
        - objectName: leads
        - objectName: lead_sources
        - objectName: price_book/materials
        - objectName: price_book/material_categories
        - objectName: price_book/price_forms
        - objectName: tags
