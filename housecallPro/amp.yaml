          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: lead_sources
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
            - fieldName: id
            - fieldName: name
          optionalFieldsAuto: all
          backfill:
            defaultPeriod:
              days: 15

        - objectName: price_book/material_categories
          destination: housecallProWebhook
          schedule: "*/10 * * * *"
          requiredFields:
