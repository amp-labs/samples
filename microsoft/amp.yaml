specVersion: 1.0.0
integrations:
  - name: readAndWriteMicrosoft
    displayName: Microsoft Graph API read and write
    provider: microsoft
    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:
        - objectName: users
          destination: microsoftWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://learn.microsoft.com/en-us/graph/api/resources/user?view=graph-rest-1.0
          requiredFields:
            - fieldName: id
            - fieldName: displayName
            - fieldName: surname
          optionalFieldsAuto: all

        - objectName: calendars
          destination: microsoftWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://learn.microsoft.com/en-us/graph/api/resources/calendar?view=graph-rest-1.0
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: color
          optionalFieldsAuto: all

        - objectName: me/events
          destination: microsoftWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://learn.microsoft.com/en-us/graph/api/resources/event?view=graph-rest-1.0
          requiredFields:
            - fieldName: id
            - fieldName: subject
            - fieldName: attendees
          optionalFieldsAuto: all

        - objectName: mailFolders
          destination: microsoftWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://learn.microsoft.com/en-us/graph/api/resources/mailfolder?view=graph-rest-1.0
          requiredFields:
            - fieldName: id
            - fieldName: displayName
          optionalFieldsAuto: all

        - objectName: me/messages
          destination: microsoftWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # Field names come from https://learn.microsoft.com/en-us/graph/api/resources/message?view=graph-rest-1.0
          requiredFields:
            - fieldName: id
            - fieldName: subject
            - fieldName: from
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: users
        - objectName: calendars
        - objectName: me/events
        - objectName: me/messages

    proxy:
      enabled: true
