specVersion: 1.0.0
integrations:
  - name: read-write-pipedrive
    provider: pipedrive
    module: "crm" # The CRM module uses v2 APIs
    read:
      objects:
        # Creating a resource for reading Activities object.
        - objectName: activities
          destination: pipedrive-webhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: id
            - fieldName: note
            - fieldName: assigned_to_user_id
          optionalFields:
            - fieldName: lead_id

        # Creating a resource for reading Deals object.
        - objectName: deals
          destination: pipedrive-webhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: id
            - fieldName: title
            - fieldName: probability
            - fieldName: products
          optionalFieldsAuto: all

        # Creating a resource for reading Organizations object.
        - objectName: organizations
          destination: pipedrive-webhook
          schedule: "*/10 * * * *" # Every 10 minutes
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: owner_id
            - fieldName: org_id
            - fieldName: address
            - fieldName: update_time
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: activities
        - objectName: deals
        - objectName: stages
