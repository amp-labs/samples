specVersion: 1.0.0
integrations:
  - name: readAndWriteLivestorm
    displayName: Livestorm read and write
    provider: livestorm
    read:
      objects:
        - objectName: events
          destination: livestormWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developers.livestorm.co/reference/get_events
          requiredFields:
            - fieldName: id
            - fieldName: title
            - fieldName: updated_at
          optionalFieldsAuto: all

        - objectName: people
          destination: livestormWebhook
          schedule: "*/10 * * * *"
          # https://developers.livestorm.co/reference/get_people
          requiredFields:
            - fieldName: id
            - fieldName: email
            - fieldName: first_name
            - fieldName: last_name
          optionalFieldsAuto: all

        - objectName: people_attributes
          destination: livestormWebhook
          schedule: "*/10 * * * *"
          # https://developers.livestorm.co/reference/get_people-attributes
          requiredFields:
            - fieldName: id
            - fieldName: slug
          optionalFieldsAuto: all

        # session_chat_messages requires a session id in the read filter (not set in this manifest).
        # Use Read API with filter when syncing chat for a known session.
        # - objectName: session_chat_messages
        #   destination: livestormWebhook
        #   schedule: "*/10 * * * *"
        #   # https://developers.livestorm.co/reference/get_sessions-id-chat-messages
        #   requiredFields:
        #     - fieldName: id
        #     - fieldName: text
        #   optionalFieldsAuto: all

    write:
      objects:
        - objectName: events # https://developers.livestorm.co/reference/post_events
        - objectName: users # https://developers.livestorm.co/reference/post_users

    proxy:
      enabled: true
