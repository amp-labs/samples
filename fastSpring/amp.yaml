specVersion: 1.0.0
integrations:
  - name: readAndWriteFastSpring
    displayName: FastSpring read and write
    provider: fastSpring

    read:
      objects:
        - objectName: accounts
          destination: fastspringWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.fastspring.com/reference/list-all-accounts
          requiredFields:
            - fieldName: id
            - fieldName: account
            - fieldName: country
          optionalFieldsAuto: all

        - objectName: orders
          destination: fastspringWebhook
          schedule: "*/10 * * * *"
          # https://developer.fastspring.com/reference/list-all-orders
          requiredFields:
            - fieldName: order
            - fieldName: id
            - fieldName: reference
          optionalFieldsAuto: all

        - objectName: products
          destination: fastspringWebhook
          schedule: "*/10 * * * *"
          # https://developer.fastspring.com/reference/list-all-product-paths
          requiredFields:
            - fieldName: path
          optionalFieldsAuto: all

        - objectName: subscriptions
          destination: fastspringWebhook
          schedule: "*/10 * * * *"
          # https://developer.fastspring.com/reference/list-all-subscriptions
          requiredFields:
            - fieldName: subscription
            - fieldName: id
            - fieldName: state
          optionalFieldsAuto: all

        - objectName: events-processed
          destination: fastspringWebhook
          schedule: "*/10 * * * *"
          # https://developer.fastspring.com/reference/list-all-processed-events
          requiredFields:
            - fieldName: id
            - fieldName: type
            - fieldName: event
          optionalFieldsAuto: all

        - objectName: events-unprocessed
          destination: fastspringWebhook
          schedule: "*/10 * * * *"
          # https://developer.fastspring.com/reference/list-all-unprocessed-events
          requiredFields:
            - fieldName: id
            - fieldName: type
            - fieldName: event
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: accounts # https://developer.fastspring.com/reference/create-an-account
        - objectName: products # https://developer.fastspring.com/reference/create-or-update-products
        - objectName: orders # https://developer.fastspring.com/reference/update-order-tags-and-attributes
        - objectName: subscriptions # https://developer.fastspring.com/reference/update-a-subscription

    proxy:
      enabled: true
