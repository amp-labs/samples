specVersion: 1.0.0
integrations:
  - name: readAndWriteRevenueCat
    displayName: RevenueCat read and write
    provider: revenueCat

    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:

        - objectName: customers
          destination: revenuecatWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://www.revenuecat.com/docs/api-v2#tag/Customer
          requiredFields:
            - fieldName: id
            - fieldName: last_seen_at
            - fieldName: first_seen_at
          optionalFieldsAuto: all

        - objectName: apps
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/App
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: type
          optionalFieldsAuto: all

        - objectName: products
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Product
          requiredFields:
            - fieldName: id
            - fieldName: store_identifier
            - fieldName: display_name
          optionalFieldsAuto: all

        - objectName: entitlements
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Entitlement
          requiredFields:
            - fieldName: id
            - fieldName: lookup_key
            - fieldName: display_name
          optionalFieldsAuto: all

        - objectName: offerings
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Offering
          requiredFields:
            - fieldName: id
            - fieldName: lookup_key
            - fieldName: display_name
          optionalFieldsAuto: all

        - objectName: integrations_webhooks
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Integration
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: url
          optionalFieldsAuto: all

        - objectName: metrics_overview
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Charts-and-Metrics
          requiredFields:
            - fieldName: id
            - fieldName: name
            - fieldName: last_updated_at
          optionalFieldsAuto: all

        - objectName: purchases
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Purchase
          requiredFields:
            - fieldName: id
            - fieldName: customer_id
            - fieldName: purchased_at
          optionalFieldsAuto: all

        - objectName: subscriptions
          destination: revenuecatWebhook
          schedule: "*/10 * * * *"
          # https://www.revenuecat.com/docs/api-v2#tag/Subscription
          requiredFields:
            - fieldName: id
            - fieldName: customer_id
            - fieldName: status
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: apps # https://www.revenuecat.com/docs/api-v2#tag/App
        - objectName: customers # https://www.revenuecat.com/docs/api-v2#tag/Customer
        - objectName: entitlements # https://www.revenuecat.com/docs/api-v2#tag/Entitlement
        - objectName: offerings # https://www.revenuecat.com/docs/api-v2#tag/Offering
        - objectName: products # https://www.revenuecat.com/docs/api-v2#tag/Product
        - objectName: integrations_webhooks # https://www.revenuecat.com/docs/api-v2#tag/Integration

    proxy:
      enabled: true