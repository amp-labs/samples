specVersion: 1.0.0
integrations:
  - name: read-write-servicenow
    provider: serviceNow
    read:
      objects:
        - objectName: incident
          destination: serviceNowWebhook
          schedule: "*/30 * * * *" # Every 30 minutes
          requiredFields:
            - fieldName: sys_id
            - fieldName: parent
            - fieldName: upon_reject
            - fieldName: child_incidents
          optionalFields:
            - fieldName: impact

        - objectName: contact
          destination: serviceNowWebhook
          schedule: "*/30 * * * *" # Every 30 minutes
          backfill:
            defaultPeriod:
              fullHistory: true
          requiredFields:
            - fieldName: country
            - fieldName: last_login_device
            - fieldName: phone
          optionalFieldsAuto: all

        - objectName: lead
          destination: serviceNowWebhook
          schedule: "*/30 * * * *" # Every 30 minutes
          backfill:
            defaultPeriod:
              fullHistory: true
          requiredFields:
            - fieldName: short_description
            - fieldName: number
            - fieldName: state
          optionalFieldsAuto: all

    write:
      objects:
        - objectName: contact
        - objectName: incident
        - objectName: consumer
