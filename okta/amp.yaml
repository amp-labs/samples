# Okta Integration
# API Documentation: https://developer.okta.com/docs/reference/core-okta-api/

specVersion: 1.0.0
integrations:
  - name: readAndWriteOkta
    displayName: Okta read and write
    provider: okta

    # Define what you want to read
    # Learn more: https://docs.withampersand.com/docs/read-actions
    read:
      objects:
        - objectName: users
          destination: oktaWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/User/
          requiredFields:
            - fieldName: id
            - fieldName: status
            - fieldName: profile
          optionalFieldsAuto: all

        - objectName: groups
          destination: oktaWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/Group/
          requiredFields:
            - fieldName: id
            - fieldName: type
            - fieldName: profile
          optionalFieldsAuto: all

        - objectName: apps
          destination: oktaWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/Application/
          requiredFields:
            - fieldName: id
            - fieldName: label
            - fieldName: status
          optionalFieldsAuto: all

        - objectName: logs
          destination: oktaWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/SystemLog/
          requiredFields:
            - fieldName: uuid
            - fieldName: eventType
            - fieldName: displayMessage
          optionalFieldsAuto: all

        - objectName: devices
          destination: oktaWebhook
          schedule: "*/10 * * * *" # Every 10 minutes
          # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/Device/
          requiredFields:
            - fieldName: id
            - fieldName: status
            - fieldName: profile
          optionalFieldsAuto: all

    # Define the objects you want to write to.
    # See https://docs.withampersand.com/docs/write-actions for more information.
    write:
      objects:
        - objectName: users # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/User/
        - objectName: groups # https://developer.okta.com/docs/api/openapi/okta-management/management/tag/Group/

    proxy:
      enabled: true
